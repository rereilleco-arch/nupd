name: quarterly-data-update
on:
  schedule:
    - cron: '0 0 5 1,4,7,10 *'
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Build station_prices.csv from input CSVs
        run: python3 run_pipeline.py
      - name: Enrich with FUDOSAN DB
        env:
          FUDOSANDB_API_KEY: ${{ secrets.FUDOSANDB_API_KEY }}
        run: |
          python3 fudosandb_update.py \
            --master input/tokyost_1.csv \
            --prices output/station_prices.csv \
            --out output/fudosan_enrichment.csv
      - name: Fetch & parse REIT filings from EDINET
        env:
          EDINET_API_KEY: ${{ secrets.EDINET_API_KEY }}
        run: |
          python3 edinet_reit_recon.py scan --days 500
          python3 run_reits.py --out output/reit_properties.csv --report output/reit_parse_report.csv
          python3 aggregate_by_station.py --in output/reit_properties.csv --stations input/tokyost_1.csv --neighbors station_neighbors.csv --out output/reit_by_station.csv
          python3 aggregate_by_company.py --in output/reit_properties.csv --names reit_names.json --out output/reit_by_company.csv
      - name: Commit outputs
        run: |
          git config user.name  "noitas-bot"
          git config user.email "bot@users.noreply.github.com"
          git add output/station_prices.csv output/fudosan_enrichment.csv output/reit_by_station.csv output/reit_by_company.csv output/reit_properties.csv output/reit_parse_report.csv output/fudosan_muni_cache.json
          git commit -m "chore: quarterly data update" || echo "no changes"
          git pull --rebase --autostash origin main || true
          git push
