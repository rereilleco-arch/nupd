name: quarterly-data-update
on:
  schedule:
    - cron: '0 0 5 1,4,7,10 *'
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Build station_prices.csv from input CSVs
        run: python3 run_pipeline.py
      - name: Enrich with FUDOSAN DB
        env:
          FUDOSANDB_API_KEY: ${{ secrets.FUDOSANDB_API_KEY }}
        run: |
          python3 fudosandb_update.py \
            --master input/tokyost_1.csv \
            --prices output/station_prices.csv \
            --out output/fudosan_enrichment.csv
      - name: Fetch & parse REIT filings from EDINET
        env:
          EDINET_API_KEY: ${{ secrets.EDINET_API_KEY }}
        run: |
          python3 edinet_reit_recon.py scan --days 400
          python3 run_reits.py
          python3 aggregate_by_muni.py --in reit_properties.csv --out output/reit_by_muni.csv
      - name: Commit outputs
        run: |
          git config user.name  "noitas-bot"
          git config user.email "bot@users.noreply.github.com"
          git add output/station_prices.csv output/fudosan_enrichment.csv output/reit_by_muni.csv
          git commit -m "chore: quarterly data update" || echo "no changes"
          git push
